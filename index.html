<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0f172a;
    color: #e2e8f0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 10px;
    background: #111827;
    text-align: center;
    font-weight: bold;
  }

  #status {
    padding: 6px 10px;
    font-size: 12px;
    background: #0b1220;
    color: #93c5fd;
  }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 140px;
  }

  .msg {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 8px;
  }

  .msg-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .title { font-weight: bold; }
  .meta { font-size: 11px; color: #64748b; }

  .msg-body { white-space: pre-wrap; }

  .delBtn {
    background: #dc2626;
    border: none;
    color: white;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
  }

  #inputArea {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111827;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  input, textarea {
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 10px;
    background: #0f172a;
    color: #e2e8f0;
    box-sizing: border-box;
  }

  button {
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<header>NEZUO FEED (OPEN)</header>
<div id="status">認証中...</div>
<div id="feed"></div>

<div id="inputArea">
  <input id="title" placeholder="タイトル" />
  <textarea id="text" placeholder="メッセージ"></textarea>
  <button id="sendBtn">投稿</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnXy8X8p__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5",
  measurementId: "G-W0XKB10WH6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const chatRef = ref(db, "chat/messages");

let uid = null;

/* -----------------------------
   UIDキャッシュ（UX改善）
------------------------------*/
const cachedUid = localStorage.getItem("uid_cache");
if (cachedUid) {
  document.getElementById("status").textContent = "UID: " + cachedUid + " (cached)";
}

/* -----------------------------
   匿名認証 + UID固定
------------------------------*/
onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;

    // キャッシュ保存
    localStorage.setItem("uid_cache", uid);

    document.getElementById("status").textContent = "UID: " + uid;
  } else {
    signInAnonymously(auth);
  }
});

/* -----------------------------
   取得
------------------------------*/
onValue(chatRef, (snap) => {
  const data = snap.val();
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  if (!data) return;

  Object.entries(data)
    .sort((a, b) => b[1].time - a[1].time)
    .forEach(([id, m]) => {

      const isMine = m.uid === uid;

      const div = document.createElement("div");
      div.className = "msg";

      div.innerHTML = `
        <div class="msg-header">
          <div>
            <div class="title">${m.title || "無題"}</div>
            <div class="meta">${m.uid || "unknown"}</div>
          </div>

          ${isMine ? `
            <button class="delBtn" onclick="delMsg('${id}', '${m.uid}')">
              削除
            </button>
          ` : ""}
        </div>

        <div class="msg-body">${m.text}</div>
      `;

      feed.appendChild(div);
    });
});

/* -----------------------------
   投稿
------------------------------*/
document.getElementById("sendBtn").onclick = () => {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!text || !uid) return;

  push(chatRef, {
    title,
    text,
    time: Date.now(),
    uid
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
};

/* -----------------------------
   削除
------------------------------*/
window.delMsg = (id, ownerUid) => {
  if (ownerUid !== uid) {
    alert("自分の投稿のみ削除できます");
    return;
  }

  if (!confirm("削除しますか？")) return;

  remove(ref(db, "chat/messages/" + id));
};
</script>

</body>
</html>
