<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED REALTIME ADMIN CMS</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 10px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

#uidBar {
  padding: 6px 10px;
  font-size: 12px;
  background: #0b1220;
  color: #93c5fd;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-bottom: 200px;
}

/* CARD */
.msg {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 10px;
  overflow: hidden;
}

.msg-header {
  padding: 8px;
  display: flex;
  justify-content: space-between;
  background: #0f172a;
  cursor: pointer;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 11px;
  color: #64748b;
}

.msg-body {
  padding: 8px;
  display: none;
  white-space: pre-wrap;
}

.msg.open .msg-body {
  display: block;
}

.delBtn {
  background: #dc2626;
  border: none;
  color: white;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 4px;
}

/* INPUT (ADMIN ONLY) */
#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111827;
  padding: 8px;
  display: none;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid #1f2937;
}

input, textarea {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 10px;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
}

textarea {
  min-height: 42px;
  max-height: 120px;
  resize: none;
}

button {
  padding: 12px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
}

/* ADMIN BUTTON */
#loginBtn {
  position: fixed;
  top: 60px;
  right: 10px;
  background: #10b981;
  border: none;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>NEZUO FEED REALTIME (ADMIN CMS)</header>

<div id="uidBar">読み込み中...</div>
<button id="loginBtn">管理者ログイン</button>

<div id="feed"></div>

<div id="inputArea">
  <input id="title" placeholder="タイトル" />
  <textarea id="text" placeholder="メッセージ入力"></textarea>
  <button onclick="send()">投稿</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnXQ8Xp__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat/messages");

/* ===== AUTH ===== */
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "your@gmail.com";

let isAdmin = false;

/* ===== LOGIN ===== */
document.getElementById("loginBtn").onclick = async () => {
  await signInWithPopup(auth, provider);
};

/* ===== AUTH STATE ===== */
onAuthStateChanged(auth, (user) => {
  if (user) {
    isAdmin = (user.email === ADMIN_EMAIL);

    document.getElementById("uidBar").textContent =
      "UID: " + user.uid + (isAdmin ? " ｜ ADMIN" : "");

    if (isAdmin) {
      document.getElementById("inputArea").style.display = "flex";
    }
  } else {
    document.getElementById("uidBar").textContent =
      "閲覧モード（ログインなし）";
  }
});

/* ===== RENDER ===== */
const feed = document.getElementById("feed");

function render(data){
  feed.innerHTML = "";

  const arr = Object.entries(data || {})
    .sort((a,b)=>b[1].time - a[1].time);

  arr.forEach(([id,m])=>{
    const div = document.createElement("div");
    div.className = "msg";
    div.classList.toggle("open", !m.collapsed);

    div.innerHTML = `
      <div class="msg-header" onclick="toggle('${id}', ${m.collapsed})">
        <div>
          <div class="title">${m.title || "無題"}</div>
          <div class="meta">${m.uid || "guest"} • ${new Date(m.time).toLocaleString()}</div>
        </div>

        ${isAdmin ? `<button class="delBtn" onclick="event.stopPropagation(); del('${id}')">削除</button>` : ""}
      </div>

      <div class="msg-body">
        ${m.text}
      </div>
    `;

    feed.appendChild(div);
  });

  feed.scrollTop = feed.scrollHeight;
}

/* ===== REALTIME ===== */
onValue(chatRef, (snapshot)=>{
  render(snapshot.val());
});

/* ===== SEND (ADMIN ONLY) ===== */
window.send = () => {
  if (!isAdmin) return;

  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!text) return;

  push(chatRef, {
    title: title || "無題",
    text,
    uid: "ADMIN",
    time: Date.now(),
    collapsed: true
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
};

/* ===== TOGGLE ===== */
window.toggle = (id,current)=>{
  update(ref(db, `chat/messages/${id}`), {
    collapsed: !current
  });
};

/* ===== DELETE (ADMIN ONLY) ===== */
window.del = (id)=>{
  if(!isAdmin) return;
  remove(ref(db, `chat/messages/${id}`));
};
</script>

</body>
</html>
